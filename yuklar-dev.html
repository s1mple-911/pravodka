<script type="module">
const SUPABASE_URL='https://kxzerccdpcltmzrxutlo.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_meO8FlGtAz1hmwNrrrgI6Q_PBh0T1rT';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
// stale-while-revalidate: keshdan darrov ko'rsat, fonda yangila (5 daqiqa TTL)
const PAGE=location.pathname.split('/').pop()||'index';
const swrKey=n=>`prov-swr:${PAGE}:${n}`;
function swrGet(n,maxAge=300000){ try{ const r=sessionStorage.getItem(swrKey(n)); if(!r) return null;
  const o=JSON.parse(r); return (Date.now()-o.t>maxAge)?null:o.v; }catch(e){ return null; } }
function swrSet(n,v){ try{ sessionStorage.setItem(swrKey(n),JSON.stringify({t:Date.now(),v})); }catch(e){} }
const $=id=>document.getElementById(id);
const icons=()=>{ if(window.lucide) lucide.createIcons(); };
const money=n=>{ const v=Math.round(Number(n)||0); return (v<0?'−':'')+Math.abs(v).toLocaleString('en-US').replaceAll(',',' '); };
const SEC_LBL={pul:"Pul mablag'lari",tovar:'Tovarlar',debitor:'Debitorlar',asosiy_vosita:'Asosiy vositalar',amortizatsiya:'Amortizatsiya',boshqa_aktiv:'Boshqa aktivlar',kreditor:'Kreditorlar',soliq_majb:'Soliq majburiyatlari',oylik_majb:'Oylik majburiyatlari',qarz:'Qarzlar',boshqa_passiv:'Boshqa passivlar',kapital:'Kapital'};
const SEC_ORD={AKTIV:['pul','tovar','debitor','asosiy_vosita','amortizatsiya','boshqa_aktiv'],PASSIV:['kreditor','soliq_majb','oylik_majb','qarz','boshqa_passiv'],KAPITAL:['kapital']};
const secLbl=s=>SEC_LBL[s]||(s?String(s).replace(/_/g,' ').replace(/^./,c=>c.toUpperCase()):'Boshqa');

function syncThemeIcon(){ const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.querySelectorAll('button[onclick="toggleTheme()"] [data-lucide]').forEach(el=>el.setAttribute('data-lucide',dark?'sun':'moon')); icons(); }
window.toggleTheme=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark'); localStorage.setItem('prov-theme',d?'light':'dark'); syncThemeIcon(); };
if(localStorage.getItem('prov-theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
window.doLogin=async()=>{ const email=$('email').value.trim(),password=$('password').value; $('authErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password}); if(error){$('authErr').textContent='Kirish xato: '+error.message;return;} window.permClear(); enterApp(); };
// permClear() shart: sessionStorage reload'dan keyin ham qoladi — yangi
// foydalanuvchi eskisining ruxsatlari bilan ochilib ketmasin.
window.logout=async()=>{ window.permClear(); await sb.auth.signOut(); location.reload(); };
// more-sheet
window.openMore=()=>{ document.getElementById('moreModal').classList.add('open'); };
window.closeMore=()=>{ document.getElementById('moreModal').classList.remove('open'); };
// /more-sheet
$('password').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });
let appShown=false;
// Ruxsatlar: keshdan darrov gate qilinadi, so'ng my_perms() bilan tasdiqlanadi.
// Ruxsat yo'q bo'lsa init() umuman ishga tushmaydi (server guard baribir ikkinchi qavat).
async function enterApp(){ if(appShown) return; appShown=true; $('gate').style.display='none'; $('app').style.display='block'; syncThemeIcon();
  if(!window.permGate()) return;
  await window.permLoad(sb);
  if(!window.permGate()) return;
  init(); }
const AUTH_KEY='sb-kxzerccdpcltmzrxutlo-auth-token';
const hasStoredSession=()=>{ try{ return !!localStorage.getItem(AUTH_KEY); }catch(e){ return false; } };
async function boot(){
  if(hasStoredSession()){
    enterApp();
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ await sb.auth.signOut().catch(()=>{}); location.reload(); }
  }else{
    syncThemeIcon();
    const {data:{session}}=await sb.auth.getSession();
    if(session) enterApp();
  }
}

// ===== Yuklar (Aros product-incomes — n8n proxy) =====
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nowUz=()=>new Date(Date.now()+5*3600*1000);
const isoDay=d=>d.toISOString().slice(0,10);
const N8N='https://n8n.arosmarket.com/webhook/aros-provodka-yuklar';
const ST_LBL={posted:'Nashr qilingan',created:'Yaratilgan'};
const DS_LBL={accepted:'Qabul qilingan',on_way:"Yo'lda"};
let yuklar=[], paidMap={}, rateMap={}, filt='all';

// document_price ko'p valyutali — kasr saqlanadi (masalan "1 373.79 USD").
function priceF(n,cur){ const v=Number(n); const c=cur?(' '+esc(cur)):'';
  if(!isFinite(v)) return esc(String(n??'—'))+c;
  return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).replaceAll(',',' ')+c; }
function dF(s){ if(!s) return '—'; try{ return new Date(s).toISOString().slice(0,10); }catch(e){ return '—'; } }
function dtF(s){ if(!s) return '—'; try{ const d=new Date(s); return d.toISOString().slice(0,10)+' '+d.toISOString().slice(11,16); }catch(e){ return '—'; } }
// Qisman to'lov: kurs → UZS, foiz = tolangan_uzs / narx_uzs.
function curRate(cur){ if(!cur||String(cur).toUpperCase()==='UZS') return 1; const r=rateMap[cur]; return (r==null?null:Number(r)); }
function narxUzs(y){ const r=curRate(y.valyuta); if(r==null) return null; return Math.round(Number(y.narx||0)*r); }
function tolangan(y){ const s=paidMap[y.id]; return s?Number(s.tolangan_uzs)||0:0; }
function pct(y){ const n=narxUzs(y); if(!n) return 0; return Math.min(100,Math.round(tolangan(y)/n*100)); }
function qoldiq(y){ const n=narxUzs(y); if(n==null) return null; return Math.max(0,n-tolangan(y)); }
function expLines(s){ if(!s||!Array.isArray(s.entrylar)||!s.entrylar.length) return '';
  return '<div class="paidsub">'+s.entrylar.map(e=>dF(e.entry_date)+': '+money(e.summa_uzs)).join(' · ')+'</div>'; }

window.setFilt=k=>{ filt=k; document.querySelectorAll('.fchip').forEach(b=>b.classList.toggle('on',b.dataset.f===k)); renderYuklar(); };

function renderError(msg){
  $('yukBody').innerHTML='<div class="errbox"><i data-lucide="cloud-off"></i>'
    +'<div class="et">Yuklar ulanmadi</div>'
    +'<div class="es">n8n endpoint (aros-provodka-yuklar) hali javob bermadi yoki tayyor emas.<br>'+esc(msg||'')+'</div>'
    +'<button class="retry" onclick="loadYuklar()"><i data-lucide="refresh-cw"></i>Qaytadan urinish</button></div>';
  icons();
}
async function loadYuklar(){
  const from=$('from').value, to=$('to').value;
  if(!from||!to) return;
  $('banner').style.display='none';
  $('yukBody').innerHTML='<div class="empty">Yuklanmoqda…</div>';
  let arr;
  try{
    const res=await fetch(N8N+'?date_from='+encodeURIComponent(from)+'&date_to='+encodeURIComponent(to),{headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    if(!j || j.ok===false || !Array.isArray(j.yuklar)) throw new Error((j&&j.error)||'javob formati kutilmagan');
    arr=j.yuklar;
  }catch(e){ renderError(e.message||String(e)); return; }
  yuklar=arr;
  // Qisman to'lov holati + valyuta kurslari (UZS'ga o'girish uchun).
  paidMap={}; rateMap={};
  const ids=yuklar.map(y=>Number(y.id)).filter(x=>Number.isFinite(x));
  const curs=[...new Set(yuklar.map(y=>y.valyuta).filter(Boolean))];
  if(curs.length){ try{ const {data:kr}=await sb.rpc('yuk_kurslar',{p_curs:curs}); rateMap=kr||{}; }catch(e){} }
  if(ids.length){ try{ const {data:st}=await sb.rpc('yuk_tolangan_summa',{p_ids:ids}); (st||[]).forEach(s=>{ paidMap[s.yuk_id]=s; }); }catch(e){} }
  fillOmbor();
  renderYuklar();
}
function fillOmbor(){
  const sel=$('omborFilt'), cur=sel.value;
  const oms=[...new Set(yuklar.map(y=>y.ombor).filter(Boolean))].sort();
  sel.innerHTML='<option value="">Barcha omborlar</option>'+oms.map(o=>'<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>').join('');
}
function renderYuklar(){
  const omb=$('omborFilt').value;
  const all=yuklar.slice();
  const nAll=all.length, nUnpaid=all.filter(y=>pct(y)===0).length, nPart=all.filter(y=>{const p=pct(y);return p>0&&p<100;}).length, nPaid=all.filter(y=>pct(y)>=100).length;
  $('cAll').textContent=nAll; $('cUnpaid').textContent=nUnpaid; $('cPart').textContent=nPart; $('cPaid').textContent=nPaid;
  let rows=all;
  if(filt==='tolanmagan') rows=rows.filter(y=>pct(y)===0);
  else if(filt==='qisman') rows=rows.filter(y=>{const p=pct(y);return p>0&&p<100;});
  else if(filt==='tolangan') rows=rows.filter(y=>pct(y)>=100);
  if(omb) rows=rows.filter(y=>y.ombor===omb);
  if(!rows.length){ $('yukBody').innerHTML='<div class="empty">Bu shartlarga mos yuk yo\'q.</div>'; return; }
  const body=rows.map(y=>{
    const stcls=y.status==='posted'?'b':'gray', stlbl=ST_LBL[y.status]||y.status||'—';
    const dscls=y.delivery_status==='accepted'?'g':'gray', dslbl=DS_LBL[y.delivery_status]||y.delivery_status||'—';
    const s=paidMap[y.id], p=pct(y), n=narxUzs(y), tolg=tolangan(y), qol=qoldiq(y);
    let tol;
    if(n==null) tol='<span class="pill gray">kurs yo\'q</span>';
    else if(p>=100) tol='<span class="pill g">To\'langan</span>'+expLines(s);
    else if(p>0) tol='<span class="pill y">Qisman '+p+'%</span><div class="paidsub">'+money(tolg)+' / '+money(n)+' · qoldi '+money(qol)+'</div>'+expLines(s);
    else tol='<span class="pill gray">To\'lanmagan</span>';
    return '<tr>'
      +'<td class="yid" data-l="ID">#'+esc(y.id)+'</td>'
      +'<td data-l="Sana">'+dF(y.sana||y.created_datetime)+'</td>'
      +'<td data-l="Ombor">'+esc(y.ombor||'—')+'</td>'
      +'<td class="prov" data-l="Yetkazuvchi">'+esc(y.yetkazuvchi||'—')+'</td>'
      +'<td class="num" data-l="Narx">'+priceF(y.narx,y.valyuta)+(y.valyuta&&String(y.valyuta).toUpperCase()!=='UZS'&&n!=null?'<div class="paidsub">≈ '+money(n)+' so\'m</div>':'')+'</td>'
      +'<td data-l="Status"><span class="pill '+stcls+'">'+esc(stlbl)+'</span></td>'
      +'<td data-l="Yetkazish"><span class="pill '+dscls+'">'+esc(dslbl)+'</span></td>'
      +'<td data-l="Nashr vaqti">'+dtF(y.post_at)+'</td>'
      +'<td data-l="To\'lov">'+tol+'</td>'
      +'</tr>';
  }).join('');
  $('yukBody').innerHTML='<div class="yscroll"><table class="ytbl"><thead><tr>'
    +'<th>ID</th><th>Sana</th><th>Ombor</th><th>Yetkazib beruvchi</th><th>Narx</th><th>Status</th><th>Yetkazish</th><th>Nashr vaqti</th><th>To\'lov</th>'
    +'</tr></thead><tbody>'+body+'</tbody></table></div>';
  icons();
}
function init(){
  const t=nowUz(), from=new Date(t.getTime()-30*86400000);
  $('to').value=isoDay(t); $('from').value=isoDay(from);
  $('from').onchange=loadYuklar; $('to').onchange=loadYuklar;
  loadYuklar();
}

// boot() ataylab eng oxirida — modul tanasi to'liq baholanib bo'lsin (TDZ oldini olish).
boot();
</script>
