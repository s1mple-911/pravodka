<script type="module">
const SUPABASE_URL='https://kxzerccdpcltmzrxutlo.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_meO8FlGtAz1hmwNrrrgI6Q_PBh0T1rT';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
// stale-while-revalidate: keshdan darrov ko'rsat, fonda yangila (5 daqiqa TTL)
const PAGE=location.pathname.split('/').pop()||'index';
const swrKey=n=>`prov-swr:${PAGE}:${n}`;
function swrGet(n,maxAge=300000){ try{ const r=sessionStorage.getItem(swrKey(n)); if(!r) return null;
  const o=JSON.parse(r); return (Date.now()-o.t>maxAge)?null:o.v; }catch(e){ return null; } }
function swrSet(n,v){ try{ sessionStorage.setItem(swrKey(n),JSON.stringify({t:Date.now(),v})); }catch(e){} }
const LIMIT=100;
let rows=[], offset=0, total=0, tur='all', accounts=[], isAdmin=false, myName='', edir='kirim', editId=null;
let accList=[], filAllow=null;
const $=id=>document.getElementById(id);
const money=n=>Math.round(Number(n)||0).toLocaleString('en-US').replaceAll(',',' ');
const icons=()=>{ if(window.lucide) lucide.createIcons(); };
const fmtDate=x=>{ if(!x) return ''; try{ return new Date(x).toLocaleDateString('ru-RU'); }catch(e){ return ''; } };
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function syncThemeIcon(){ const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.querySelectorAll('button[onclick="toggleTheme()"] [data-lucide]').forEach(el=>el.setAttribute('data-lucide',dark?'sun':'moon')); icons(); }
window.toggleTheme=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark'); localStorage.setItem('prov-theme',d?'light':'dark'); syncThemeIcon(); };
if(localStorage.getItem('prov-theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
window.doLogin=async()=>{ const email=$('email').value.trim(),password=$('password').value; $('authErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password}); if(error){$('authErr').textContent='Kirish xato: '+error.message;return;} enterApp(); };
window.logout=async()=>{ await sb.auth.signOut(); location.reload(); };
// more-sheet
window.openMore=()=>{ document.getElementById('moreModal').classList.add('open'); };
window.closeMore=()=>{ document.getElementById('moreModal').classList.remove('open'); };
// /more-sheet
$('password').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });
let appShown=false;
function enterApp(){ if(appShown) return; appShown=true; $('gate').style.display='none'; $('app').style.display='block'; syncThemeIcon(); init(); }
// Auth gate — localStorage'da token bo'lsa DARROV app'ni ko'rsat, sessiyani fonda tekshir (miltillamaydi)
const AUTH_KEY='sb-kxzerccdpcltmzrxutlo-auth-token';
const hasStoredSession=()=>{ try{ return !!localStorage.getItem(AUTH_KEY); }catch(e){ return false; } };
async function boot(){
  if(hasStoredSession()){
    enterApp();
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ await sb.auth.signOut().catch(()=>{}); location.reload(); }
  }else{
    syncThemeIcon();
    const {data:{session}}=await sb.auth.getSession();
    if(session) enterApp();
  }
}
boot();

async function loadRole(){
  const {data:{user}}=await sb.auth.getUser();
  myName = user?.email || 'foydalanuvchi';
  const {data:p}=await sb.from('profiles').select('full_name,role').eq('id',user.id).maybeSingle();
  if(p){ isAdmin=(p.role==='admin'); if(p.full_name) myName=p.full_name; }
  $('roleBadge').textContent = (isAdmin?'Admin · ':'Foydalanuvchi · ')+myName;
}

// sana — UZB (UTC+5)
const nowUz=()=>new Date(Date.now()+5*3600*1000);
const iso=d=>d.toISOString().slice(0,10);
window.setRange=k=>{
  const n=nowUz(); let f,t=iso(n);
  if(k==='bugun') f=t;
  else if(k==='hafta'){ const d=new Date(n.getTime()); const dow=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-dow); f=iso(d); }
  else if(k==='oy') f=iso(new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),1)));
  else { // o'tgan oy: 1-sanadan oxirgi kunigacha
    f=iso(new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth()-1,1)));
    t=iso(new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),0)));
  }
  $('from').value=f; $('to').value=t; load();
};
window.setTur=(k,btn)=>{ tur=k;
  [...$('turSeg').children].forEach(b=>b.classList.remove('on')); btn.classList.add('on'); render();
};

// Hisob ro'yxati — optgroup bilan. Tartib muhim: birinchi moslik yutadi.
const GRP=[
  {lbl:'Markaziy kassalar',f:a=>a.kassa_turi==='markaziy'},
  {lbl:'Filial kassalari', f:a=>a.kassa_turi==='filial'},
  {lbl:'Xarajat kassalar', f:a=>a.kassa_turi==='xarajat'},
  {lbl:'Omborlar',         f:a=>a.section==='tovar'},
  {lbl:'Daromad',          f:a=>a.type==='daromad'},
  {lbl:'Xarajat',          f:a=>a.type==='xarajat'},
];
const optOf=a=>`<option value="${a.id}">${esc(a.code)} · ${esc(a.name)}</option>`;
// filAllow=null → hamma hisob; Set → faqat tanlangan filialning hisoblari ("Barcha hisoblar"siz)
function buildAccSel(){
  // 'xarajat_guruh' (5400) — konteyner, unga yozuv tushmaydi → filtrda ham ko'rsatilmaydi
  const base=accList.filter(a=>a.kassa_turi!=='xarajat_guruh');
  const list=filAllow?base.filter(a=>filAllow.has(a.id)):base, used=new Set();
  // Bo'sh qiymat doim birinchi: filial tanlangan bo'lsa "Butun filial" (p_accounts), aks holda "Barcha hisoblar"
  let html=`<option value="">${filAllow?'Butun filial':'Barcha hisoblar'}</option>`;
  for(const g of GRP){
    const rs=list.filter(a=>!used.has(a.id)&&g.f(a));
    rs.forEach(a=>used.add(a.id));
    if(rs.length) html+=`<optgroup label="${g.lbl}">`+rs.map(optOf).join('')+'</optgroup>';
  }
  const boshqa=list.filter(a=>!used.has(a.id));
  if(boshqa.length) html+='<optgroup label="Boshqa">'+boshqa.map(optOf).join('')+'</optgroup>';
  $('acc').innerHTML=html||'<option value="">— hisob yo\'q —</option>';
}
async function loadAccSel(){
  const {data,error}=await sb.from('v_hisob_royxat').select('*').order('code');
  if(error){ $('banner').style.display='block'; $('banner').textContent='Hisob ro\'yxati: '+error.message; return; }
  accList=data||[];
  buildAccSel();
  $('acc').onchange=load;
}
// Filial ro'yxati. View hali yo'q bo'lsa filtrni butunlay yashiramiz.
async function loadFilSel(){
  const {data,error}=await sb.from('v_filial_royxat').select('*').order('filial');
  if(error||!data){ $('fil').closest('.fld').style.display='none'; return; }
  $('fil').innerHTML='<option value="">Barcha filiallar</option>'
    +data.map(f=>`<option value="${esc(f.warehouse_id)}">${esc(f.filial)}</option>`).join('');
  $('fil').onchange=onFil;
}
function note(m){ const n=$('filNote'); n.style.display=m?'block':'none'; n.textContent=m||''; }
async function onFil(){
  const w=$('fil').value;
  if(!w){ filAllow=null; note(''); buildAccSel(); await load(); return; }
  const {data,error}=await sb.from('v_filial_hisob').select('*').eq('warehouse_id',w);
  if(error){ note('Filial hisoblari: '+error.message); return; }
  const ids=[...new Set((data||[]).map(r=>r.account_id).filter(Boolean))];
  filAllow=new Set(ids); buildAccSel();
  if(!ids.length){
    note('Bu filialga hisob bog\'lanmagan — Sozlamalar → "Filiallarni bog\'lash".');
    rows=[]; offset=0; total=0; render(); return;
  }
  note('');
  await load();
}

// TASNIF — section='pul' bo'yicha, kod prefiksi bilan EMAS.
const isPul=l=>l&&l.section==='pul';
function klass(e){
  const dt=(e.lines||[]).find(l=>Number(l.debit)>0), kt=(e.lines||[]).find(l=>Number(l.credit)>0);
  if((e.lines||[]).length>2) return {kind:'nt',ic:'layers',sign:''};
  const dp=isPul(dt), kp=isPul(kt);
  if(dp&&kp)  return {kind:'tr', ic:'arrow-left-right', sign:'', dt,kt};
  if(dp)      return {kind:'in', ic:'arrow-down-left',  sign:'+', dt,kt};
  if(kp)      return {kind:'out',ic:'arrow-up-right',   sign:'−', dt,kt};
  return        {kind:'nt', ic:'arrow-right',     sign:'', dt,kt};   // ikkalasi ham pul emas
}
const sumDt=e=>(e.lines||[]).reduce((a,l)=>a+(Number(l.debit)||0),0);

function lineRow(l){
  const dt=Number(l.debit)||0, kt=Number(l.credit)||0;
  const fc=(l.currency&&l.currency!=='UZS'&&l.fc_amount)?`<span class="fc">(${money(l.fc_amount)} ${esc(l.currency)})</span>`:'';
  return `<div class="jline"><span class="n"><span class="code">${esc(l.code||'')}</span>${esc(l.name||'')}</span>`
    +`<span class="a ${dt>0?'dt':'kt'}">${dt>0?'Dt':'Kt'} ${money(dt>0?dt:kt)}${fc}</span></div>`;
}

function render(){
  const q=$('q').value.trim().toLowerCase();
  const list=rows.filter(e=>{
    if(tur!=='all' && klass(e).kind!==tur) return false;
    if(q && !String(e.description||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const filtered=(tur!=='all'||q);
  $('count').innerHTML=filtered
    ? `<b>${list.length}</b> ta ko'rsatilmoqda · yuklangan ${rows.length} / jami <b>${total}</b> ta yozuv`
    : `<b>${total}</b> ta yozuv${rows.length<total?` · ${rows.length} tasi yuklandi`:''}`;
  $('moreBtn').style.display = rows.length<total ? 'flex' : 'none';
  if(!list.length){ $('journal').innerHTML='<div class="empty">Bu shartlarga mos yozuv yo\'q</div>'; icons(); return; }
  $('journal').innerHTML=list.map(e=>{
    const k=klass(e), amt=sumDt(e);
    const izoh=e.description?' · '+esc(e.description):'';
    const multi=(e.lines||[]).length>2;
    let label,sub;
    if(multi){ label=esc(e.description||'Ko\'p satrli yozuv'); sub=e.entry_date+' · '+e.lines.length+' satr'; }
    else if(k.kind==='in'){ label=esc(k.kt?.name||''); sub=e.entry_date+' · '+esc(k.dt?.name||'')+izoh; }
    else if(k.kind==='out'){ label=esc(k.dt?.name||''); sub=e.entry_date+' · '+esc(k.kt?.name||'')+izoh; }
    else { label=esc(k.kt?.name||'')+' → '+esc(k.dt?.name||''); sub=e.entry_date+izoh; }
    const lines=multi?`<div class="jlines">${e.lines.map(lineRow).join('')}</div>`:'';
    if(e.is_deleted){
      return `<div class="je del-row${multi?' multi':''}"><div class="ic ${k.kind}"><i data-lucide="${k.ic}"></i></div>
        <div class="mid"><div class="t">${label}</div><div class="s">${sub}</div>
          <div class="meta"><i data-lucide="trash-2"></i>O'chirdi: ${esc(e.deleted_by_name||'—')} · ${fmtDate(e.deleted_at)}</div>${lines}</div>
        <div class="amt ${k.kind}">${k.sign}${money(amt)}</div></div>`;
    }
    // Tahrir faqat 2 satrli va kassa qatnashgan yozuvga — modal boshqasini ifodalay olmaydi.
    const editable=isAdmin && !multi && (isPul(k.dt)||isPul(k.kt));
    const acts=isAdmin?`<div class="acts">${editable?`<button class="act edit" onclick="openEdit('${e.id}')"><i data-lucide="pencil"></i></button>`:''}<button class="act del" onclick="softDelete('${e.id}')"><i data-lucide="trash-2"></i></button></div>`:'';
    const edited=e.edited_at?`<div class="edited"><i data-lucide="pencil"></i>Tahrirladi: ${esc(e.edited_by_name||'—')}</div>`:'';
    return `<div class="je${multi?' multi':''}"><div class="ic ${k.kind}"><i data-lucide="${k.ic}"></i></div>
      <div class="mid"><div class="t">${label}</div><div class="s">${sub}</div>${edited}${lines}</div>
      <div class="amt ${k.kind}">${k.sign}${money(amt)}</div>${acts}</div>`;
  }).join('');
  icons();
}
window.render=render;

// Hisob tanlansa u ustun (p_account). Aks holda filial hisoblari massiv sifatida (p_accounts).
function args(){
  const acc=$('acc').value||null;
  const accs=(!acc && filAllow) ? [...filAllow] : null;
  return {p_from:$('from').value,p_to:$('to').value,p_account:acc,p_accounts:accs};
}
async function load(){
  offset=0; rows=[];
  const a=args();
  const ck='load:'+JSON.stringify(a);
  const cached=swrGet(ck);
  if(cached){ rows=cached.rows||[]; offset=rows.length; total=cached.total||rows.length; render(); }
  else { $('journal').innerHTML='<div class="empty">Yuklanmoqda…</div>'; }
  const [{data,error},{data:c,error:ce}]=await Promise.all([
    sb.rpc('jurnal',{...a,p_limit:LIMIT,p_offset:0}),
    sb.rpc('jurnal_count',a),
  ]);
  if(error){ if(!cached){ $('journal').innerHTML=`<div class="empty">${esc(error.message)}</div>`; $('count').textContent='—'; } return; }
  if(ce){ $('banner').style.display='block'; $('banner').textContent='Soni: '+ce.message; }
  rows=data||[]; offset=rows.length; total=Number(c)||rows.length;
  swrSet(ck,{rows,total});
  render();
}
window.loadMore=async()=>{
  const b=$('moreBtn'); b.disabled=true;
  const {data,error}=await sb.rpc('jurnal',{...args(),p_limit:LIMIT,p_offset:offset});
  b.disabled=false;
  if(error){ $('banner').style.display='block'; $('banner').textContent=error.message; return; }
  rows=rows.concat(data||[]); offset=rows.length; render();
};

window.softDelete=async id=>{
  if(!isAdmin){ alert('Faqat admin o\'chira oladi'); return; }
  if(!confirm('Bu yozuv o\'chirilsinmi? (jurnalda usti chizilib qoladi)')) return;
  const {data:e}=await sb.from('entry').select('*,entry_line(*)').eq('id',id).single();
  await sb.from('entry_history').insert({entry_id:id,action:'delete',snapshot:e,changed_by_name:myName});
  const {error}=await sb.from('entry').update({is_deleted:true,deleted_at:new Date().toISOString(),deleted_by_name:myName}).eq('id',id);
  if(error){ alert(error.message); return; } await load();
};

// tahrir — provodka.html'dagi mantiq
// 'xarajat_guruh' (5400) — konteyner, tahrir modalida tanlanmaydi. Hodim kassalari (5401+) tanlanadi.
function isKassa(a){ return a.type==='aktiv' && a.code.startsWith('5') && a.kassa_turi!=='xarajat_guruh'; }
function listFor(d){ if(d==='chiqim') return accounts.filter(a=>a.type==='xarajat');
  if(d==='transfer') return accounts.filter(isKassa);
  return accounts.filter(a=> a.type==='daromad' || a.code==='4010' || a.code==='8000'); }
function fillSel(sel,arr,val){ sel.innerHTML=''; arr.forEach(a=>{ const o=document.createElement('option'); o.value=a.id; o.textContent=a.name; if(a.id===val)o.selected=true; sel.appendChild(o); }); }
window.openEdit=id=>{
  if(!isAdmin){ alert('Faqat admin tahrirlay oladi'); return; }
  const e=rows.find(x=>x.id===id); if(!e) return; editId=id;
  const dtL=e.lines.find(l=>Number(l.debit)>0)||{}, ktL=e.lines.find(l=>Number(l.credit)>0)||{};
  const dtAcc=accounts.find(a=>a.id===dtL.account_id), ktAcc=accounts.find(a=>a.id===ktL.account_id);
  let d='chiqim'; if(isPul(dtL)&&isPul(ktL)) d='transfer'; else if(isPul(dtL)) d='kirim';
  $('eAmount').value=money(Number(dtL.debit)||0); $('eIzoh').value=e.description||''; $('eSana').value=e.entry_date||'';
  eSetDir(d, dtAcc, ktAcc);
  $('editModal').classList.add('open'); icons();
};
window.eFmt=el=>{ const raw=el.value.replaceAll(' ','').replace(/\D/g,''); el.value=raw?money(raw):''; };
window.eSetDir=(d,dtAcc,ktAcc)=>{ edir=d;
  $('ebIn').className=d==='kirim'?'on-in':''; $('ebOut').className=d==='chiqim'?'on-out':''; $('ebTr').className=d==='transfer'?'on-tr':'';
  $('eKassaLbl').textContent=d==='kirim'?'Qaysi kassaga':'Qaysi kassadan';
  $('eCounterLbl').textContent=d==='kirim'?'Nimadan':(d==='transfer'?'Qaysi kassaga':'Nimaga');
  let kassaVal,counterVal;
  if(dtAcc&&ktAcc){ if(d==='kirim'){ kassaVal=dtAcc.id; counterVal=ktAcc.id; } else { kassaVal=ktAcc.id; counterVal=dtAcc.id; } }
  fillSel($('eKassa'), accounts.filter(isKassa), kassaVal);
  fillSel($('eCounter'), listFor(d), counterVal);
  icons();
};
window.closeEdit=()=>{ $('editModal').classList.remove('open'); editId=null; };
window.saveEdit=async()=>{
  if(!editId) return;
  const amt=Number(($('eAmount').value||'').replaceAll(' ',''))||0;
  const kassa=$('eKassa').value, counter=$('eCounter').value;
  if(amt<=0||!kassa||!counter){ alert('Summa/kassa/kategoriya to\'ldiring'); return; }
  if(edir==='transfer'&&kassa===counter){ alert('Bir xil kassa'); return; }
  let dtAcc,ktAcc; if(edir==='kirim'){ dtAcc=kassa; ktAcc=counter; } else { dtAcc=counter; ktAcc=kassa; }
  const {data:old}=await sb.from('entry').select('*,entry_line(*)').eq('id',editId).single();
  await sb.from('entry_history').insert({entry_id:editId,action:'edit',snapshot:old,changed_by_name:myName});
  const dtId=old.entry_line.find(l=>Number(l.debit)>0)?.id;
  const ktId=old.entry_line.find(l=>Number(l.credit)>0)?.id;
  await sb.from('entry').update({entry_date:$('eSana').value||null,description:$('eIzoh').value||null,edited_at:new Date().toISOString(),edited_by_name:myName}).eq('id',editId);
  await sb.from('entry_line').update({account_id:dtAcc,debit:amt,credit:0}).eq('id',dtId);
  await sb.from('entry_line').update({account_id:ktAcc,debit:0,credit:amt}).eq('id',ktId);
  closeEdit(); await load();
};

async function init(){
  const n=nowUz();
  $('from').value=iso(new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),1)));
  $('to').value=iso(n);
  $('from').onchange=load; $('to').onchange=load;
  // Mustaqil so'rovlar parallel ketadi — ketma-ket kutish yo'q
  await Promise.all([
    loadRole(),
    (async()=>{ const {data:accs}=await sb.from('accounts').select('*').eq('is_active',true).order('code'); accounts=accs||[]; })(),
    loadAccSel(),
    loadFilSel(),
    load(),
  ]);
}
</script>
