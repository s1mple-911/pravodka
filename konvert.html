<!DOCTYPE html>
<html lang="uz">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{--bg:#f5f6f8;--surface:#fff;--surface-2:#f0f2f5;--ink:#101828;--muted:#667085;--line:#e6e8ec;--primary:#1ea83a;--primary-hover:#17862f;--primary-soft:#e6f6ea;--on-primary:#fff;--green:#12b76a;--green-soft:#e7f7ef;--red:#f04438;--red-soft:#feecea;--amber:#b54708;--amber-soft:#fef0c7;--shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);--shadow-hover:0 6px 16px rgba(16,24,40,.10);--side:240px;--radius:14px}
  [data-theme="dark"]{--bg:#0b0e14;--surface:#151a22;--surface-2:#1e232d;--ink:#e6e9ef;--muted:#8a93a3;--line:#252b36;--primary:#2ec24a;--primary-hover:#45d160;--primary-soft:#10281a;--green:#2dd08a;--green-soft:#0f2a1e;--red:#ff5c50;--red-soft:#33150f;--amber:#fdb022;--amber-soft:#2e1e05;--shadow:0 1px 3px rgba(0,0,0,.45);--shadow-hover:0 8px 22px rgba(0,0,0,.55)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.5}
  .num,.rq .amt,.rq .kv b,.rq .usd{font-variant-numeric:tabular-nums}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  #app{display:none}.sidebar{display:none}
  .main{padding:22px 26px 40px;max-width:900px;margin:0 auto}
  @media(min-width:900px){.sidebar{display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:var(--side);background:var(--surface);border-right:1px solid var(--line);padding:20px 14px;z-index:40}.main{margin-left:var(--side)}.mobile-only{display:none!important}.bnav{display:none!important}}
  @media(max-width:899px){.desktop-only{display:none!important}body{padding-bottom:76px}}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
  .logo{width:30px;height:36px;color:var(--primary);display:flex;align-items:center;justify-content:center}.logo svg{width:100%;height:100%;display:block}
  .brand-name{font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--primary)}.brand-name span{color:var(--muted);font-weight:500}
  .side-nav{display:flex;flex-direction:column;gap:3px;flex:1}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-weight:500;cursor:pointer;transition:background .13s,color .13s}
  .nav-item svg{width:19px;height:19px}.nav-item:hover{background:var(--surface-2);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .role-badge{font-size:11px;color:var(--muted);padding:4px 12px 8px;font-weight:500}
  .side-foot{display:flex;flex-direction:column;gap:3px;border-top:1px solid var(--line);padding-top:12px}
  .icon-btn{display:inline-flex;align-items:center;gap:9px;background:transparent;border:none;color:var(--muted);border-radius:10px;padding:9px 12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .13s,color .13s}
  .icon-btn svg{width:19px;height:19px}.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
  .page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0}
  .head-actions{display:flex;gap:4px;align-items:center}
  .sec{font-size:13px;color:var(--muted);margin:0 0 12px 2px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .rq{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .rq.pending{border-left:3px solid var(--amber)}
  .rq.done{border-left:3px solid var(--green)}
  .rq.rejected{border-left:3px solid var(--red)}
  .rq .hd{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .rq .amt{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .rq .usd{font-size:13.5px;color:var(--muted);font-weight:600;margin-left:7px}
  .st{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 11px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .st svg{width:12px;height:12px}
  .st.pending{background:var(--amber-soft);color:var(--amber)}
  .st.done{background:var(--green-soft);color:var(--green)}
  .st.rejected{background:var(--red-soft);color:var(--red)}
  .rq .grid{display:grid;grid-template-columns:1fr;gap:7px;font-size:13.5px}
  @media(min-width:640px){.rq .grid{grid-template-columns:1fr 1fr}}
  .rq .kv{display:flex;justify-content:space-between;gap:10px;color:var(--muted)}
  .rq .kv b{color:var(--ink);font-weight:600;text-align:right}
  .rq .kv b.warn{color:var(--amber)}
  .rq .note{font-size:13px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line);line-height:1.5}
  .rq .acts{display:flex;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .rq .acts button{flex:1;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .13s,color .13s,border-color .13s}
  .rq .acts button svg{width:16px;height:16px}
  .rq .acts button:disabled{opacity:.5;cursor:not-allowed}
  .rq .acts .ok{background:var(--primary);border-color:var(--primary);color:#fff}
  .rq .acts .ok:hover:not(:disabled){background:var(--primary-hover)}
  .rq .acts .no:hover:not(:disabled){background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:14px;border:1px dashed var(--line);border-radius:13px}
  .note{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.55}
  .banner{background:var(--red-soft);color:var(--red);border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:16px;display:none}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
  .authbox{width:100%;max-width:360px}.authbox .logo{width:46px;height:54px;margin:0 auto 18px}
  .authbox h1{font-size:23px;text-align:center;margin:0 0 4px;font-weight:800}.authbox p{text-align:center;color:var(--muted);margin:0 0 24px;font-size:14px}
  .authbox input{width:100%;height:50px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;padding:0 15px;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;transition:border-color .13s,box-shadow .13s}
  .authbox input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .authbox button{width:100%;height:50px;border:none;border-radius:12px;background:var(--primary);color:var(--on-primary);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .13s,transform .12s}
  .authbox button:hover{background:var(--primary-hover);transform:translateY(-1px)}
  .autherr{color:var(--red);font-size:14px;margin-top:12px;text-align:center;min-height:18px}
  .bnav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);border-top:1px solid var(--line);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  .bnav a{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;color:var(--muted);text-decoration:none;padding:9px 0;cursor:pointer;transition:color .13s}
  .bnav a svg{width:18px;height:18px}.bnav a.active{color:var(--primary)}
  /* more-sheet */
  .mmodal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:200}
  .mmodal.open{display:flex}
  .msheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:80vh;overflow:auto}
  .msheet h3{margin:0 0 14px;font-size:17px;font-weight:800}
  .msheet a{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:11px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:500;cursor:pointer;transition:background .13s}
  .msheet a svg{width:19px;height:19px;color:var(--muted)}
  .msheet a:hover{background:var(--surface-2)}
  .msheet a.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .msheet a.active svg{color:var(--primary)}
  .msheet .close{width:100%;height:46px;margin-top:12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);color:var(--ink);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .13s}
  .msheet .close:hover{background:var(--line)}
  /* /more-sheet */
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL='https://kxzerccdpcltmzrxutlo.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_meO8FlGtAz1hmwNrrrgI6Q_PBh0T1rT';
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const icons=()=>{ if(window.lucide) lucide.createIcons(); };
const money=n=>{ const v=Math.round(Number(n)||0); return (v<0?'−':'')+Math.abs(v).toLocaleString('en-US').replaceAll(',',' '); };
const usdFmt=n=>(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).replaceAll(',',' ')+' $';
const fmtWhen=x=>{ if(!x) return ''; try{ return new Date(x).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } };
const ST_LBL={pending:'Kutilmoqda',done:'Bajarildi',rejected:'Rad etildi',approved:'Tasdiqlandi'};
const ST_IC={pending:'clock',done:'check',rejected:'x',approved:'check'};
const stLbl=s=>ST_LBL[s]||(s?String(s).replace(/_/g,' '):'—');
let isAdmin=false, myName='', accById={};

function syncThemeIcon(){ const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.querySelectorAll('button[onclick="toggleTheme()"] [data-lucide]').forEach(el=>el.setAttribute('data-lucide',dark?'sun':'moon')); icons(); }
window.toggleTheme=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark'); localStorage.setItem('prov-theme',d?'light':'dark'); syncThemeIcon(); };
if(localStorage.getItem('prov-theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
window.doLogin=async()=>{ const email=$('email').value.trim(),password=$('password').value; $('authErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password}); if(error){$('authErr').textContent='Kirish xato: '+error.message;return;} enterApp(); };
window.logout=async()=>{ await sb.auth.signOut(); location.reload(); };
// more-sheet
window.openMore=()=>{ document.getElementById('moreModal').classList.add('open'); };
window.closeMore=()=>{ document.getElementById('moreModal').classList.remove('open'); };
// /more-sheet
$('password').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });
function enterApp(){ $('gate').style.display='none'; $('app').style.display='block'; syncThemeIcon(); init(); }
async function boot(){ const {data:{session}}=await sb.auth.getSession(); if(session) enterApp(); else syncThemeIcon(); }
boot();

async function loadRole(){
  const {data:{user}}=await sb.auth.getUser(); myName=user?.email||'foydalanuvchi';
  const {data:p}=await sb.from('profiles').select('full_name,role').eq('id',user.id).maybeSingle();
  if(p){ isAdmin=(p.role==='admin'); if(p.full_name) myName=p.full_name; }
  $('roleBadge').textContent=(isAdmin?'Admin · ':'Foydalanuvchi · ')+myName;
}
const accName=id=>accById[id]?accById[id].name:'—';
// Farq foizi so'rov paytidagi Aros kursidan hisoblanadi
function farqPct(r){
  const a=Number(r.aros_rate)||0, k=Number(r.rate)||0;
  if(!a||!k) return null;
  return (k-a)/a*100;
}
function card(r){
  const st=String(r.status||'');
  const pct=farqPct(r);
  const pctTxt=pct===null?'—':(pct>0?'+':'')+pct.toFixed(2)+'%';
  const chiqib=pct!==null&&Math.abs(pct)>2;
  const acts=(isAdmin&&st==='pending')?`<div class="acts">
      <button class="ok" onclick="approve('${r.id}')"><i data-lucide="check"></i>Tasdiqlash</button>
      <button class="no" onclick="reject('${r.id}')"><i data-lucide="x"></i>Rad etish</button>
    </div>`:'';
  const decided=(st!=='pending'&&r.decided_by_name)?`<div class="note">${stLbl(st)}: ${r.decided_by_name} · ${fmtWhen(r.decided_at)}</div>`:'';
  const note=r.note?`<div class="note">${r.note}</div>`:'';
  return `<div class="rq ${st}">
    <div class="hd">
      <div><span class="amt">${money(r.amount)}</span><span class="usd">→ ${usdFmt(r.fc_amount)}</span></div>
      <span class="st ${st}"><i data-lucide="${ST_IC[st]||'circle'}"></i>${stLbl(st)}</span>
    </div>
    <div class="grid">
      <div class="kv"><span>Kimdan</span><b>${accName(r.from_account)}</b></div>
      <div class="kv"><span>Kimga</span><b>${accName(r.to_account)}</b></div>
      <div class="kv"><span>Kurs</span><b>${money(r.rate)}</b></div>
      <div class="kv"><span>Aros kursi</span><b>${r.aros_rate?money(r.aros_rate):'—'}</b></div>
      <div class="kv"><span>Farq</span><b class="${chiqib?'warn':''}">${pctTxt}</b></div>
      <div class="kv"><span>So'radi</span><b>${r.requested_by_name||'—'} · ${fmtWhen(r.requested_at)}</b></div>
    </div>${note}${decided}${acts}</div>`;
}
window.approve=async id=>{
  if(!confirm('Bu konvert tasdiqlansinmi? Pul harakat qiladi.')) return;
  const {data,error}=await sb.rpc('convert_approve',{p_id:id});
  if(error){ showErr(error.message); return; }
  if(data&&data.ok===false){ showErr(data.error||'Tasdiqlab bo\'lmadi'); return; }
  await load();
};
window.reject=async id=>{
  const note=prompt('Rad etish sababi:'); if(note===null) return;
  const {data,error}=await sb.rpc('convert_reject',{p_id:id,p_note:note||null});
  if(error){ showErr(error.message); return; }
  if(data&&data.ok===false){ showErr(data.error||'Rad etib bo\'lmadi'); return; }
  await load();
};
function showErr(m){ $('banner').style.display='block'; $('banner').textContent='Xato: '+m; }
async function load(){
  $('banner').style.display='none';
  // RLS hal qiladi: admin hammasini, oddiy user faqat o'zinikini ko'radi
  const {data,error}=await sb.from('convert_request').select('*').order('requested_at',{ascending:false}).limit(100);
  if(error){ showErr(error.message); return; }
  const rows=data||[];
  const pend=rows.filter(r=>r.status==='pending');
  const rest=rows.filter(r=>r.status!=='pending');
  $('pendWrap').style.display=pend.length?'block':'none';
  $('pend').innerHTML=pend.map(card).join('');
  $('hist').innerHTML=rest.length?rest.map(card).join('')
    :`<div class="empty">${rows.length?'Boshqa so\'rov yo\'q':'Hali konvert so\'rovi yo\'q'}</div>`;
  $('foot').textContent=isAdmin
    ? "Kurs Aros kursidan ±2% dan ko'p farq qilsa so'rov tasdiqqa tushadi. Tasdiqlangunicha pul harakat qilmaydi."
    : "Bu yerda o'z so'rovlaringiz holati ko'rinadi. Tasdiqlashni admin bajaradi.";
  icons();
}
